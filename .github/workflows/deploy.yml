name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compute base path
        id: base
        run: |
          # For a project page (repo != <user>.github.io), Vite must build
          # with base "/<repo>/". For a user/org page, base is "/".
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.base }}
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}
        run: bun run build

      - name: SPA fallback (404.html = index.html)
        run: |
          if [ -f dist/index.html ]; then
            cp dist/index.html dist/404.html
          fi
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
