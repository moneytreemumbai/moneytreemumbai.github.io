name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compute base path
        id: base
        run: |
          # For a project page (repo != <user>.github.io), Vite must build
          # with base "/<repo>/". For a user/org page, base is "/".
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static)
        env:
          BUILD_TARGET: github-pages
          VITE_BASE_PATH: ${{ steps.base.outputs.base }}
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}
        run: bun run build

      - name: Resolve static output dir
        id: outdir
        run: |
          for d in dist/public dist/client dist; do
            if [ -f "$d/index.html" ]; then
              echo "dir=$d" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No index.html found in dist/public, dist/client, or dist" >&2
          ls -R dist | head -80 >&2
          exit 1

      - name: SPA fallback and Jekyll opt-out
        run: |
          OUT="${{ steps.outdir.outputs.dir }}"
          cp "$OUT/index.html" "$OUT/404.html"
          touch "$OUT/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.outdir.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
